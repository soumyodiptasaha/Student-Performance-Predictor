<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Predictor</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>🎓 Student Performance Predictor</h1>

    <p class="subtitle">
        Predict student final grades using Machine Learning
    </p>

    <form action="/predict" method="POST">

        <label>Study Time</label>
        <input type="number"
               name="studytime"
               min="1"
               max="4"
               placeholder="Enter study time"
               required>

        <label>Failures</label>
        <input type="number"
               name="failures"
               placeholder="Enter number of failures"
               required>

        <label>Absences</label>
        <input type="number"
               name="absences"
               placeholder="Enter absences"
               required>

        <label>G1 Grade</label>
        <input type="number"
               name="g1"
               placeholder="Enter first period grade"
               required>

        <label>G2 Grade</label>
        <input type="number"
               name="g2"
               placeholder="Enter second period grade"
               required>

        <button type="submit">
            Predict Grade 🚀
        </button>

    </form>

   {% if prediction %}

<div class="result">
    <h2>
🎯 Predicted Final Grade (G3)
</h2>

<h1>
{{ prediction }}
</h1>

    <h3 class="performance">
        Performance: {{ category }}
    </h3>
    <h3 class="grade">
    Grade: {{ grade }}
    </h3>
    <h3>
    Status: {{ status }}
    </h3>
</div>

{% endif %}

</div>

<p class="footer">
    Built with Flask, Scikit-Learn & Machine Learning 🚀
</p>

</body>
</html>
